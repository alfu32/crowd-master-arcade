name: crowd-master-arcade
title: Crowd Master Arcade
base: core24
adopt-info: crowd-master-arcade
summary: Arcade crowd runner
description: |
  Crowd Master Arcade is a 3D arcade crowd runner packaged from the
  repository Gradle build. The snap ships the runnable desktop jar,
  bundled runtime assets, and a compact Java runtime built with jlink.
icon: snap/gui/icon.png

grade: stable
confinement: strict

platforms:
  amd64:

apps:
  crowd-master-arcade:
    command: bin/crowd-master-arcade
    desktop: snap/gui/crowd-master-arcade.desktop
    environment:
      CROWD_MASTER_ARCADE_HOME: $SNAP_USER_COMMON/.crowdmaster
      ALSA_CONFIG_PATH: $SNAP/usr/share/alsa/alsa.conf
    plugs:
      - desktop
      - desktop-legacy
      - home
      - removable-media
      - opengl
      - wayland
      - x11
      - audio-playback

parts:
  crowd-master-arcade:
    plugin: nil
    source: .
    build-packages:
      - git
      - openjdk-21-jdk-headless
    stage-packages:
      - libasound2t64
      - libasound2-data
      - alsa-topology-conf
      - alsa-ucm-conf
      - libdrm2
      - libegl1
      - libgbm1
      - libgl1
      - libgles2
      - libgl1-mesa-dri
      - libglx-mesa0
      - libglu1-mesa
      - libopengl0
      - libwayland-client0
      - libwayland-cursor0
      - libwayland-egl1
      - libx11-6
      - libxcursor1
      - libxext6
      - libxfixes3
      - libxi6
      - libxinerama1
      - libxkbcommon0
      - libxrandr2
      - libxrender1
      - libxtst6
      - libxxf86vm1
    override-build: |
      set -eux

      export JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
      export GRADLE_USER_HOME="$CRAFT_PROJECT_DIR/.gradle-user"
      export PATH="$JAVA_HOME/bin:$PATH"
      SNAP_VERSION="${CROWD_MASTER_ARCADE_SNAP_VERSION:-$(git describe --tags --abbrev=0 2>/dev/null || echo 0.1.0)}"

      APP_JAR="lwjgl3/build/libs/crowd-master-arcade-$SNAP_VERSION.jar"
      if [ ! -f "$APP_JAR" ]; then
        APP_JAR="$(find lwjgl3/build/libs -maxdepth 1 -type f -name 'crowd-master-arcade-*.jar' -printf '%T@ %p\n' | sort -nr | awk 'NR==1 {print $2}')"
      fi
      if [ -z "$APP_JAR" ] || [ ! -f "$APP_JAR" ]; then
        if command -v gradle >/dev/null 2>&1; then
          GRADLE_CMD="gradle"
        else
          chmod 755 ./gradlew
          GRADLE_CMD="./gradlew"
        fi
        "$GRADLE_CMD" --no-daemon -PreleaseNumber="$SNAP_VERSION" :lwjgl3:jar
        APP_JAR="lwjgl3/build/libs/crowd-master-arcade-$SNAP_VERSION.jar"
        if [ ! -f "$APP_JAR" ]; then
          APP_JAR="$(find lwjgl3/build/libs -maxdepth 1 -type f -name 'crowd-master-arcade-*.jar' -printf '%T@ %p\n' | sort -nr | awk 'NR==1 {print $2}')"
        fi
      fi
      if [ -z "$APP_JAR" ] || [ ! -f "$APP_JAR" ]; then
        echo "Unable to locate built desktop jar." >&2
        exit 1
      fi

      MODULES_RAW="$("$JAVA_HOME/bin/jdeps" \
        --ignore-missing-deps \
        --multi-release 21 \
        --print-module-deps \
        "$APP_JAR"),jdk.crypto.ec,jdk.unsupported"
      MODULES="$(printf '%s\n' "$MODULES_RAW" | tr ',' '\n' | sed '/^$/d' | sort -u | paste -sd, -)"

      install -d "$CRAFT_PART_INSTALL/opt/crowd-master-arcade"
      install -d "$CRAFT_PART_INSTALL/bin"
      install -d "$CRAFT_PART_INSTALL/snap/gui"

      "$JAVA_HOME/bin/jlink" \
        --add-modules "$MODULES" \
        --strip-debug \
        --no-header-files \
        --no-man-pages \
        --compress=2 \
        --output "$CRAFT_PART_INSTALL/opt/crowd-master-arcade/runtime"

      install -m 0644 "$APP_JAR" "$CRAFT_PART_INSTALL/opt/crowd-master-arcade/crowd-master-arcade.jar"
      cp -a core/src/main/resources "$CRAFT_PART_INSTALL/opt/crowd-master-arcade/resources"
      install -m 0644 snap/gui/crowd-master-arcade.desktop "$CRAFT_PART_INSTALL/snap/gui/crowd-master-arcade.desktop"
      install -m 0644 snap/gui/icon.png "$CRAFT_PART_INSTALL/snap/gui/icon.png"

      cat > "$CRAFT_PART_INSTALL/bin/crowd-master-arcade" <<'EOF'
      #!/bin/sh
      set -eu
      INSTALL_PATH="$SNAP/opt/crowd-master-arcade"
      RUNTIME_HOME="${CROWD_MASTER_ARCADE_HOME:-$SNAP_USER_COMMON/.crowdmaster}"
      mkdir -p "$RUNTIME_HOME"
      export HOME="$RUNTIME_HOME"
      exec "$INSTALL_PATH/runtime/bin/java" -jar "$INSTALL_PATH/crowd-master-arcade.jar" "$@"
      EOF
      chmod 755 "$CRAFT_PART_INSTALL/bin/crowd-master-arcade"

      craftctl set version="$SNAP_VERSION"
